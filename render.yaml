services:
  - type: web
    name: inventory-backend
    env: python
    rootDir: backend
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: RENDER_DATA_DIR
        value: "/opt/render/inventory-data"
      - key: RENDER_UPLOAD_DIR
        value: "/opt/render/inventory-data/uploads"
    disk:
      name: inventory-data
      mountPath: /opt/render/inventory-data
      sizeGB: 1
